name: Deploy to GitHub Pages

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22.14
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Full dependency audit
        run: pnpm audit --audit-level high

      - name: Conversion idempotency
        run: pnpm run test:idempotency

      - name: Generated data matches the committed baseline
        run: git diff --exit-code -- data

      - name: Schema validation
        run: pnpm run test:product

      - name: Clinical contradiction checks
        run: pnpm run test:clinical

      - name: Bilingual fixtures
        run: pnpm run test:bilingual

      - name: Unit and behavioral tests
        run: pnpm run test

      - name: Medical review workbook contract
        run: pnpm run test:medical-review

      - name: Medical review queue contract
        run: pnpm run test:medical-review-queue

      - name: Reviewed v1.4 case import contract
        run: pnpm run test:release-v14

      - name: Adversarial scoring tests
        run: pnpm run test:adversarial

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Repository secret scan
        run: pnpm run test:secrets

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Playwright E2E
        timeout-minutes: 5
        run: pnpm run test:e2e

      - name: Prepare build metadata
        run: |
          echo "NEXT_PUBLIC_APP_VERSION=2.4.2" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_GIT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_CASE_LIBRARY_VERSION=42-case-2.4-review-candidate" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SCORING_VERSION=360-event-v1" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_DEPLOYMENT_TIER=practice" >> "$GITHUB_ENV"

      - name: Validate production API origin
        env:
          NEXT_PUBLIC_API_BASE_URL: https://hematuria-training-system.vercel.app
        run: pnpm run validate:api-config

      - name: Build static site
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ github.event.repository.name == format('{0}.github.io', github.repository_owner) && '' || format('/{0}', github.event.repository.name) }}
          NEXT_PUBLIC_API_BASE_URL: https://hematuria-training-system.vercel.app
        run: pnpm run build

      - name: Static bundle secret and answer scan
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ github.event.repository.name == format('{0}.github.io', github.repository_owner) && '' || format('/{0}', github.event.repository.name) }}
          NEXT_PUBLIC_API_BASE_URL: https://hematuria-training-system.vercel.app
        run: pnpm run test:bundle

      - name: Final tracked-worktree cleanliness gate
        run: |
          git diff --exit-code
          test -z "$(git status --porcelain --untracked-files=all)"

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ./out

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
